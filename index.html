<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST HUNTER V2.1 - المطور سيزار</title>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #030303; --card: #080808; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .sezar-header { border: 2px solid var(--gold); padding: 20px; width: 95%; max-width: 550px; text-align: center; border-radius: 15px; margin-bottom: 25px; background: #000; box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
        .search-box { width: 95%; max-width: 550px; margin-bottom: 25px; }
        input { width: 100%; padding: 18px; background: #111; border: 1px solid #333; color: var(--gold); border-radius: 12px; text-align: center; font-weight: bold; font-size: 18px; outline: none; box-sizing: border-box; }
        .monitor-panel { width: 95%; max-width: 550px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px;}
        .card { background: var(--card); border: 1px solid #222; padding: 18px; border-radius: 15px; }
        .card-title { font-size: 13px; color: #888; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px;}
        .ghost-alert { border-color: var(--ghost) !important; animation: sezarPulse 1.5s infinite; }
        @keyframes sezarPulse { 0% { box-shadow: 0 0 0px var(--ghost); } 50% { box-shadow: 0 0 15px var(--ghost); } 100% { box-shadow: 0 0 0px var(--ghost); } }
        .data-row { display: flex; justify-content: space-between; font-size: 14px; padding: 10px 0; border-bottom: 1px solid #111; }
        .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
        .safe { background: #064e3b; color: var(--green); }
        .danger { background: #450a0a; color: var(--red); }
        .iceberg-panel { width: 95%; max-width: 550px; background: #050505; border: 2px solid #222; border-radius: 15px; padding: 15px; box-sizing: border-box; }
        .iceberg-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 13px; }
        .iceberg-price { color: #00e6ff; font-weight: bold; }
        .type-buy { color: var(--green); }
        .type-sell { color: var(--red); }
        #log-container { width: 95%; max-width: 550px; margin-top: 25px; background: #000; border: 1px solid #333; height: 180px; overflow-y: auto; padding: 15px; font-size: 12px; border-radius: 12px; color: #888; box-sizing: border-box;}
        .log-entry { margin-bottom: 8px; border-right: 3px solid var(--gold); padding-right: 10px; }
    </style>
</head>
<body onload="startAnalysis()">

    <div class="sezar-header">
        <h1 style="color:var(--gold); margin:0;">「 GHOST HUNTER V2.1 」</h1>
        <div style="font-size: 11px; color:#666;">نظام سيزار المتطور - فحص حي ⚡</div>
    </div>

    <div class="search-box">
        <input type="text" id="symbol" value="BTCUSDT" onchange="startAnalysis()">
    </div>

    <div class="monitor-panel">
        <div class="card" id="iceberg-card">
            <div class="card-title"><span>ICEBERG DETECTOR</span><span class="status-badge safe" id="ice-status">SCANNING</span></div>
            <div class="data-row"><span>تجديد السيولة:</span> <span id="refill-rate">0%</span></div>
            <div class="data-row"><span>ضغط الحيتان:</span> <span id="whale-pressure">LOW</span></div>
        </div>
        <div class="card" id="spoof-card">
            <div class="card-title"><span>SPOOFING RADAR</span><span class="status-badge safe" id="spoof-status">STABLE</span></div>
            <div class="data-row"><span>جدران مهربة (30s):</span> <span id="fled-walls">0</span></div>
            <div class="data-row"><span>ثبات الجدار:</span> <span id="stability">100%</span></div>
        </div>
    </div>

    <div class="iceberg-panel">
        <div style="font-size: 14px; font-weight:bold; color:#fff; text-align:center; border-bottom: 1px solid #333; padding-bottom:10px; margin-bottom:10px;">「 SEZAR'S ICEBERG HUNTER 」</div>
        <div id="iceberg-list"><div style="color:#444; text-align:center; font-size:12px; padding: 10px;">بانتظار البيانات الحية...</div></div>
    </div>

    <div id="log-container"></div>

    <script>
        let currentSymbol = '', pInt, alertAudio = new Audio('https://www.soundjay.com/buttons/beep-07a.mp3');
        let lastBids = [], lastAsks = [];

        function startAnalysis() {
            const sym = document.getElementById('symbol').value.toUpperCase();
            if(sym === currentSymbol && pInt) return;
            currentSymbol = sym;
            clearInterval(pInt);
            addLog(`تم الاتصال.. جاري صيد حيتان ${currentSymbol}`);
            fetchData();
            pInt = setInterval(fetchData, 2000);
        }

        async function fetchData() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentSymbol}&limit=500`);
                const data = await res.json();
                if(data.bids) analyze(data.bids, data.asks);
            } catch (e) { console.error("API Error"); }
        }

        function analyze(bids, asks) {
            let topB = bids[0], topA = asks[0];
            let icebergs = [];

            if (lastBids.length > 0) {
                if (parseFloat(topB[0]) === parseFloat(lastBids[0][0])) {
                    let diff = parseFloat(topB[1]) - parseFloat(lastBids[0][1]);
                    if (diff > 1) icebergs.push({p: topB[0], v: diff, t: 'Buyer'});
                }
                if (parseFloat(topA[0]) === parseFloat(lastAsks[0][0])) {
                    let diff = parseFloat(topA[1]) - parseFloat(lastAsks[0][1]);
                    if (diff > 1) icebergs.push({p: topA[0], v: diff, t: 'Seller'});
                }
            }

            if (icebergs.length > 0) {
                alertAudio.play();
                document.getElementById('iceberg-card').classList.add('ghost-alert');
                document.getElementById('ice-status').innerText = "DETECTED";
                document.getElementById('ice-status').className = "status-badge danger";
                updateIceList(icebergs);
            } else {
                document.getElementById('iceberg-card').classList.remove('ghost-alert');
                document.getElementById('ice-status').innerText = "SCANNING";
                document.getElementById('ice-status').className = "status-badge safe";
            }
            
            lastBids = bids; lastAsks = asks;
        }

        function updateIceList(arr) {
            const list = document.getElementById('iceberg-list');
            arr.forEach(ice => {
                addLog(`اكتشاف Iceberg ${ice.t} عند $${ice.p} 🎯`);
                const row = document.createElement('div');
                row.className = 'iceberg-row';
                row.innerHTML = `<span class="iceberg-price">$${ice.p}</span><span class="${ice.t==='Buyer'?'type-buy':'type-sell'}">${ice.t.toUpperCase()}</span>`;
                list.prepend(row);
                if (list.children.length > 5) list.removeChild(list.lastChild);
            });
        }

        function addLog(msg) {
            const log = document.getElementById('log-container');
            const e = document.createElement('div');
            e.className = 'log-entry';
            e.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.prepend(e);
            if (log.children.length > 20) log.removeChild(log.lastChild);
        }
    </script>
</body>
</html>
