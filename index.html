<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST HUNTER V2.3 - محرك السيولة</title>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #020202; --card: #0a0a0a; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .sezar-header { border: 2px solid var(--gold); padding: 15px; width: 95%; max-width: 550px; text-align: center; border-radius: 15px; margin-bottom: 20px; background: #000; box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); }
        .search-box { width: 95%; max-width: 550px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: var(--gold); border-radius: 12px; text-align: center; font-weight: bold; font-size: 18px; outline: none; box-sizing: border-box; }
        
        /* ميزان القوة الجديد */
        .battle-meter { width: 95%; max-width: 550px; background: #111; border-radius: 10px; height: 35px; margin-bottom: 20px; position: relative; overflow: hidden; display: flex; align-items: center; border: 1px solid #222; }
        #power-buyer { background: var(--green); height: 100%; width: 50%; transition: 0.8s; opacity: 0.7; }
        #power-seller { background: var(--red); height: 100%; width: 50%; transition: 0.8s; opacity: 0.7; }
        .battle-text { position: absolute; width: 100%; text-align: center; font-size: 12px; font-weight: bold; text-shadow: 0 0 5px #000; z-index: 5; }

        .iceberg-panel { width: 95%; max-width: 550px; background: var(--card); border: 2px solid #222; border-radius: 15px; padding: 10px; box-sizing: border-box; }
        .ice-header { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 11px; color: #555; }
        .iceberg-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 10px; border-bottom: 1px solid #111; font-size: 13px; }
        .price-tag { color: #00e6ff; font-weight: bold; width: 30%; }
        .amount-tag { color: var(--gold); font-weight: bold; width: 40%; text-align: center; }
        .type-tag { width: 30%; text-align: left; font-weight: bold; }
        
        #log-container { width: 95%; max-width: 550px; margin-top: 20px; background: #000; border: 1px solid #333; height: 120px; overflow-y: auto; padding: 10px; font-size: 11px; border-radius: 10px; color: #555; }
    </style>
</head>
<body onload="startAnalysis()">

    <div class="sezar-header">
        <h1 style="color:var(--gold); margin:0; font-size: 18px;">「 GHOST HUNTER V2.3 」</h1>
        <div style="font-size: 10px; color:#666;">كاشف المبالغ المالية للحيتان - المطور سيزار</div>
    </div>

    <div class="search-box">
        <input type="text" id="symbol" value="BTCUSDT" onchange="startAnalysis()">
    </div>

    <div class="battle-meter">
        <div id="power-buyer"></div>
        <div id="power-seller"></div>
        <div class="battle-text" id="battle-label">جاري قياس سيطرة الحيتان...</div>
    </div>

    <div class="iceberg-panel">
        <div class="ice-header">
            <span>سعر الهدف</span>
            <span>القيمة المخفية ($)</span>
            <span>النية (ACTION)</span>
        </div>
        <div id="iceberg-list"></div>
    </div>

    <div id="log-container"></div>

    <script>
        let currentSymbol = '', pInt, alertAudio = new Audio('https://www.soundjay.com/buttons/beep-07a.mp3');
        let lastBids = [], lastAsks = [];
        let totalBuyMoney = 0, totalSellMoney = 0;

        function startAnalysis() {
            const sym = document.getElementById('symbol').value.toUpperCase();
            if(sym === currentSymbol) return;
            currentSymbol = sym;
            clearInterval(pInt);
            totalBuyMoney = 0; totalSellMoney = 0;
            document.getElementById('iceberg-list').innerHTML = '';
            addLog(`تم ربط المحرك المالي لعملة ${currentSymbol}`);
            fetchData();
            pInt = setInterval(fetchData, 2000);
        }

        async function fetchData() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentSymbol}&limit=100`);
                const data = await res.json();
                if(data.bids) analyze(data.bids, data.asks);
            } catch (e) { }
        }

        function analyze(bids, asks) {
            let icebergs = [];
            if (lastBids.length > 0) {
                // فحص شراء مخفي
                if (parseFloat(bids[0][0]) === parseFloat(lastBids[0][0])) {
                    let diff = parseFloat(bids[0][1]) - parseFloat(lastBids[0][1]);
                    if (diff > 0.1) {
                        let money = diff * parseFloat(bids[0][0]);
                        icebergs.push({p: bids[0][0], m: money, t: 'Buyer'});
                        totalBuyMoney += money;
                    }
                }
                // فحص بيع مخفي
                if (parseFloat(asks[0][0]) === parseFloat(lastAsks[0][0])) {
                    let diff = parseFloat(asks[0][1]) - parseFloat(lastAsks[0][1]);
                    if (diff > 0.1) {
                        let money = diff * parseFloat(asks[0][0]);
                        icebergs.push({p: asks[0][0], m: money, t: 'Seller'});
                        totalSellMoney += money;
                    }
                }
            }

            if (icebergs.length > 0) {
                alertAudio.play();
                updateBattleMeter();
                updateList(icebergs);
            }
            lastBids = bids; lastAsks = asks;
        }

        function updateBattleMeter() {
            let total = totalBuyMoney + totalSellMoney;
            if (total === 0) return;
            let buyPer = (totalBuyMoney / total) * 100;
            let sellPer = 100 - buyPer;
            
            document.getElementById('power-buyer').style.width = buyPer + "%";
            document.getElementById('power-seller').style.width = sellPer + "%";
            
            let label = buyPer > sellPer ? `سيطرة للمشترين (${buyPer.toFixed(0)}%)` : `سيطرة للبائعين (${sellPer.toFixed(0)}%)`;
            document.getElementById('battle-label').innerText = label;
        }

        function updateList(arr) {
            const list = document.getElementById('iceberg-list');
            arr.forEach(ice => {
                const row = document.createElement('div');
                row.className = 'iceberg-row';
                const formattedMoney = ice.m >= 1000000 ? (ice.m/1000000).toFixed(2) + "M" : (ice.m/1000).toFixed(1) + "K";
                
                row.innerHTML = `
                    <span class="price-tag">$${parseFloat(ice.p).toLocaleString()}</span>
                    <span class="amount-tag">$${formattedMoney}</span>
                    <span class="type-tag ${ice.t==='Buyer'?'style-green':'style-red'}" style="color:${ice.t==='Buyer'?'var(--green)':'var(--red)'}">${ice.t.toUpperCase()}</span>
                `;
                list.prepend(row);
                addLog(`حوت ${ice.t} ضخ $${formattedMoney} عند سعر $${ice.p}`);
                if (list.children.length > 10) list.removeChild(list.lastChild);
            });
        }

        function addLog(msg) {
            const log = document.getElementById('log-container');
            const e = document.createElement('div');
            e.innerHTML = `> ${msg}`;
            log.prepend(e);
            if (log.children.length > 20) log.removeChild(log.lastChild);
        }
    </script>
</body>
</html>
