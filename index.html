<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST HUNTER V2.7 - المطور سيزار</title>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #050505; --card: #0a0a0a; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .sezar-header { border: 2px solid var(--gold); padding: 15px; width: 95%; max-width: 500px; text-align: center; border-radius: 15px; margin-bottom: 20px; background: #000; box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .search-box { width: 95%; max-width: 500px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: var(--gold); border-radius: 10px; text-align: center; font-weight: bold; font-size: 16px; outline: none; box-sizing: border-box; }
        
        .monitor-panel { width: 95%; max-width: 500px; display: grid; gap: 15px; }
        .card { background: var(--card); border: 1px solid #222; padding: 20px; border-radius: 15px; position: relative; overflow: hidden; }
        .card-title { font-size: 12px; color: #666; margin-bottom: 15px; display: flex; justify-content: space-between; text-transform: uppercase; }
        
        .ghost-alert { border-color: var(--ghost) !important; animation: sezarPulse 1.5s infinite; }
        @keyframes sezarPulse { 0% { box-shadow: 0 0 0px var(--ghost); } 50% { box-shadow: 0 0 10px var(--ghost); } 100% { box-shadow: 0 0 0px var(--ghost); } }
        
        .data-row { display: flex; justify-content: space-between; font-size: 15px; padding: 10px 0; border-bottom: 1px solid #111; }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
        .safe { background: #064e3b; color: #22c55e; }
        .danger { background: #450a0a; color: #ef4444; }

        /* 🔥 تطوير حقل الايسبرغ - جدول بداخل البطاقة */
        .ice-table { width: 100%; margin-top: 10px; font-size: 12px; }
        .ice-header { display: flex; justify-content: space-between; color: #444; border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 5px; }
        .ice-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .p-tag { color: #00e6ff; font-weight: bold; }
        .m-tag { color: var(--gold); font-weight: bold; }

        #log-container { width: 95%; max-width: 500px; margin-top: 20px; background: #000; border: 1px solid #333; height: 120px; overflow-y: auto; padding: 15px; font-size: 11px; border-radius: 15px; color: #555; box-sizing: border-box; }
    </style>
</head>
<body onload="startAnalysis()">

    <div class="sezar-header">
        <h2 style="margin:0; color:var(--gold); letter-spacing: 2px;">「 GHOST HUNTER V2.7 」</h2>
        <div style="font-size: 10px; color:#555; margin-top: 5px;">تطوير حقل الايسبرغ المالي - المطور سيزار</div>
    </div>

    <div class="search-box">
        <input type="text" id="symbol" value="BTCUSDT" onchange="startAnalysis()">
    </div>

    <div class="monitor-panel">
        <div class="card" id="iceberg-card">
            <div class="card-title"><span>ICEBERG DETECTOR</span><span class="status-badge safe" id="ice-status">SCANNING</span></div>
            <div class="ice-table">
                <div class="ice-header"><span>النية</span><span>المبلغ ($)</span><span>السعر</span></div>
                <div id="iceberg-list">
                    <div style="text-align:center; padding:15px; color:#333;">بانتظار رصد الحيتان...</div>
                </div>
            </div>
        </div>

        <div class="card" id="spoof-card">
            <div class="card-title"><span>SPOOFING RADAR</span><span class="status-badge safe" id="spoof-status">STABLE</span></div>
            <div class="data-row"><span>جدران مهربة (30s):</span> <span id="fled-walls">0</span></div>
            <div class="data-row"><span>ثبات الجدار:</span> <span id="stability" style="color:var(--green);">100%</span></div>
        </div>

        <div class="card">
            <div class="card-title"><span>LIQUIDITY VOIDS</span><span class="status-badge" style="background:#78350f; color:var(--gold);">DANGER ZONE</span></div>
            <div class="data-row"><span>فجوة الصعود:</span> <span id="up-gap" style="color:var(--green);">0.00%</span></div>
            <div class="data-row"><span>فجوة الهبوط:</span> <span id="down-gap" style="color:var(--red);">0.00%</span></div>
        </div>
    </div>

    <div id="log-container"></div>

    <script>
        let currentSymbol = '', pInt, alertAudio = new Audio('https://www.soundjay.com/buttons/beep-07a.mp3');
        let lastBids = [], lastAsks = [];

        function startAnalysis() {
            const sym = document.getElementById('symbol').value.toUpperCase();
            if(sym === currentSymbol) return;
            currentSymbol = sym; clearInterval(pInt);
            document.getElementById('iceberg-list').innerHTML = '';
            fetchData(); pInt = setInterval(fetchData, 2000);
        }

        async function fetchData() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentSymbol}&limit=100`);
                const data = await res.json();
                if(data.bids) analyze(data.bids, data.asks);
            } catch (e) { }
        }

        function analyze(bids, asks) {
            // 1. فجوات السيولة
            let tB = parseFloat(bids[0][0]), tA = parseFloat(asks[0][0]);
            document.getElementById('up-gap').innerText = ((parseFloat(asks[10][0])-tA)/tA*100).toFixed(2) + "%";
            document.getElementById('down-gap').innerText = ((tB-parseFloat(bids[10][0]))/tB*100).toFixed(2) + "%";

            // 2. كشف الايسبرغ المالي
            let found = [];
            if (lastBids.length > 0) {
                if (parseFloat(bids[0][0]) === parseFloat(lastBids[0][0])) {
                    let d = parseFloat(bids[0][1]) - parseFloat(lastBids[0][1]);
                    if (d > 0.05) found.push({p: bids[0][0], m: d * bids[0][0], t: 'Buyer'});
                }
                if (parseFloat(asks[0][0]) === parseFloat(lastAsks[0][0])) {
                    let d = parseFloat(asks[0][1]) - parseFloat(lastAsks[0][1]);
                    if (d > 0.05) found.push({p: asks[0][0], m: d * asks[0][0], t: 'Seller'});
                }
            }

            if (found.length > 0) {
                alertAudio.play();
                document.getElementById('iceberg-card').classList.add('ghost-alert');
                document.getElementById('ice-status').innerText = "ICEBERG DETECTED";
                document.getElementById('ice-status').className = "status-badge danger";
                updateIceList(found);
            } else {
                document.getElementById('iceberg-card').classList.remove('ghost-alert');
                document.getElementById('ice-status').innerText = "SCANNING";
                document.getElementById('ice-status').className = "status-badge safe";
            }

            // 3. كشف التلاعب (Spoofing)
            let vanishes = 0;
            if (lastAsks.length > 0) {
                lastAsks.slice(0, 15).forEach(p => { if(!asks.some(c => c[0]===p[0])) vanished++; });
                document.getElementById('fled-walls').innerText = vanishes;
            }
            
            lastBids = bids; lastAsks = asks;
        }

        function updateIceList(arr) {
            const list = document.getElementById('iceberg-list');
            if(list.querySelector('div[style*="text-align:center"]')) list.innerHTML = '';
            
            arr.forEach(ice => {
                const row = document.createElement('div');
                row.className = 'ice-row';
                const mFormatted = ice.m >= 1000000 ? (ice.m/1000000).toFixed(2) + "M" : (ice.m/1000).toFixed(1) + "K";
                row.innerHTML = `
                    <span style="color:${ice.t==='Buyer'?'var(--green)':'var(--red)'}; font-weight:bold; width:30%;">${ice.t.toUpperCase()}</span>
                    <span class="m-tag" style="width:40%; text-align:center;">$${mFormatted}</span>
                    <span class="p-tag" style="width:30%; text-align:left;">${parseFloat(ice.p).toLocaleString()}</span>
                `;
                list.prepend(row);
                if (list.children.length > 5) list.removeChild(list.lastChild);
            });
        }

        function addLog(msg) {
            const log = document.getElementById('log-container');
            const e = document.createElement('div'); e.innerHTML = `> ${msg}`;
            log.prepend(e); if (log.children.length > 10) log.removeChild(log.lastChild);
        }
    </script>
</body>
</html>
