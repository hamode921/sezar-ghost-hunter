<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST HUNTER V2.5 - المطور سيزار</title>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #030303; --card: #0a0a0a; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .sezar-header { border: 2px solid var(--gold); padding: 15px; width: 95%; max-width: 550px; text-align: center; border-radius: 15px; margin-bottom: 20px; background: #000; box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .search-box { width: 95%; max-width: 550px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: var(--gold); border-radius: 12px; text-align: center; font-weight: bold; font-size: 18px; outline: none; box-sizing: border-box; }
        
        .monitor-panel { width: 95%; max-width: 550px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;}
        .card { background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 12px; text-align: center; }
        .card-label { font-size: 10px; color: #555; margin-top: 5px; }
        .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 5px; font-weight: bold; display: inline-block; }
        .safe { background: #064e3b; color: var(--green); }
        .danger { background: #450a0a; color: var(--red); }
        .ghost-alert { border: 1px solid var(--ghost) !important; animation: sezarPulse 1.5s infinite; }
        @keyframes sezarPulse { 0% { box-shadow: 0 0 0px var(--ghost); } 50% { box-shadow: 0 0 10px var(--ghost); } 100% { box-shadow: 0 0 0px var(--ghost); } }

        /* لوحة الصيد المالية المتطورة */
        .iceberg-panel { width: 95%; max-width: 550px; background: var(--card); border: 2px solid #222; border-radius: 15px; padding: 10px; box-sizing: border-box; }
        .ice-header { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 11px; color: #555; }
        .iceberg-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid #111; font-size: 13px; }
        .price-tag { color: #00e6ff; font-weight: bold; width: 33%; }
        .amount-tag { color: var(--gold); font-weight: bold; width: 34%; text-align: center; }
        .type-tag { width: 33%; text-align: left; font-weight: bold; }
        
        #log-container { width: 95%; max-width: 550px; margin-top: 20px; background: #000; border: 1px solid #333; height: 100px; overflow-y: auto; padding: 10px; font-size: 10px; border-radius: 10px; color: #444; }
    </style>
</head>
<body onload="startAnalysis()">

    <div class="sezar-header">
        <h1 style="color:var(--gold); margin:0; font-size: 18px;">「 GHOST HUNTER V2.5 」</h1>
        <div style="font-size: 10px; color:#555;">نظام سيزار المعدل - كاشف السيولة المخفية 💰</div>
    </div>

    <div class="search-box">
        <input type="text" id="symbol" value="BTCUSDT" onchange="startAnalysis()">
    </div>

    <div class="monitor-panel">
        <div class="card" id="ice-card">
            <div class="status-badge safe" id="ice-status">SCANNING</div>
            <div class="card-label">ICEBERG DETECTOR</div>
        </div>
        <div class="card" id="spoof-card">
            <div class="status-badge safe" id="spoof-status">STABLE</div>
            <div class="card-label">SPOOFING RADAR</div>
        </div>
    </div>

    <div class="iceberg-panel">
        <div style="text-align:center; font-size:12px; color:var(--gold); margin-bottom:10px;">「 SEZAR'S ICEBERG HUNTER 」</div>
        <div class="ice-header"><span>سعر الهدف</span><span>المبلغ ($)</span><span>النية</span></div>
        <div id="iceberg-list"></div>
    </div>

    <div id="log-container"></div>

    <script>
        let currentSymbol = '', pInt, alertAudio = new Audio('https://www.soundjay.com/buttons/beep-07a.mp3');
        let lastBids = [], lastAsks = [];

        function startAnalysis() {
            const sym = document.getElementById('symbol').value.toUpperCase();
            if(sym === currentSymbol) return;
            currentSymbol = sym; clearInterval(pInt);
            document.getElementById('iceberg-list').innerHTML = '';
            addLog(`تم تشغيل المحرك لعملة ${currentSymbol}`);
            fetchData(); pInt = setInterval(fetchData, 2000);
        }

        async function fetchData() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentSymbol}&limit=100`);
                const data = await res.json();
                if(data.bids) analyze(data.bids, data.asks);
            } catch (e) { }
        }

        function analyze(bids, asks) {
            let found = [];
            if (lastBids.length > 0) {
                // فحص تجديد الشراء (Buying Iceberg) بالدولار
                if (parseFloat(bids[0][0]) === parseFloat(lastBids[0][0])) {
                    let d = parseFloat(bids[0][1]) - parseFloat(lastBids[0][1]);
                    if (d > 0.01) { 
                        let money = d * bids[0][0]; 
                        found.push({p: bids[0][0], m: money, t: 'Buyer'}); 
                    }
                }
                // فحص تجديد البيع (Selling Iceberg) بالدولار
                if (parseFloat(asks[0][0]) === parseFloat(lastAsks[0][0])) {
                    let d = parseFloat(asks[0][1]) - parseFloat(lastAsks[0][1]);
                    if (d > 0.01) { 
                        let money = d * asks[0][0]; 
                        found.push({p: asks[0][0], m: money, t: 'Seller'}); 
                    }
                }
            }

            if (found.length > 0) {
                alertAudio.play();
                document.getElementById('ice-card').classList.add('ghost-alert');
                document.getElementById('ice-status').innerText = "ICEBERG DETECTED";
                document.getElementById('ice-status').className = "status-badge danger";
                updateList(found);
            } else {
                document.getElementById('ice-card').classList.remove('ghost-alert');
                document.getElementById('ice-status').innerText = "SCANNING";
                document.getElementById('ice-status').className = "status-badge safe";
            }
            lastBids = bids; lastAsks = asks;
        }

        function updateList(arr) {
            const list = document.getElementById('iceberg-list');
            arr.forEach(ice => {
                const row = document.createElement('div');
                row.className = 'iceberg-row';
                // تنسيق المبلغ بالآلاف أو الملايين
                const m = ice.m >= 1000000 ? (ice.m/1000000).toFixed(2) + "M" : (ice.m/1000).toFixed(1) + "K";
                
                row.innerHTML = `
                    <span class="price-tag">$${parseFloat(ice.p).toLocaleString()}</span>
                    <span class="amount-tag">$${m}</span>
                    <span class="type-tag" style="color:${ice.t==='Buyer'?'var(--green)':'var(--red)'}">${ice.t.toUpperCase()}</span>
                `;
                list.prepend(row);
                addLog(`حوت ${ice.t} ضخ $${m} عند سعر $${ice.p}`);
                if (list.children.length > 10) list.removeChild(list.lastChild);
            });
        }

        function addLog(msg) {
            const log = document.getElementById('log-container');
            const e = document.createElement('div'); e.innerHTML = `> ${msg}`;
            log.prepend(e); if (log.children.length > 15) log.removeChild(log.lastChild);
        }
    </script>
</body>
</html>
