<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST HUNTER V2.6 - المطور سيزار</title>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: monospace; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .sezar-header { border: 2px solid var(--gold); padding: 15px; width: 95%; max-width: 500px; text-align: center; border-radius: 15px; margin-bottom: 20px; background: #000; box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); }
        .search-box { width: 95%; max-width: 500px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: var(--gold); border-radius: 10px; text-align: center; font-weight: bold; font-size: 16px; outline: none; box-sizing: border-box; }
        
        .monitor-panel { width: 95%; max-width: 500px; display: grid; gap: 15px; }
        .card { background: #0a0a0a; border: 1px solid #222; padding: 20px; border-radius: 15px; position: relative; overflow: hidden; transition: 0.3s; }
        .card-title { font-size: 12px; color: #666; margin-bottom: 15px; display: flex; justify-content: space-between; text-transform: uppercase; letter-spacing: 1px; }
        
        .ghost-alert { border-color: var(--ghost) !important; animation: sezarPulse 1.5s infinite; }
        @keyframes sezarPulse { 0% { box-shadow: 0 0 0px var(--ghost); } 50% { box-shadow: 0 0 10px var(--ghost); } 100% { box-shadow: 0 0 0px var(--ghost); } }
        
        .data-row { display: flex; justify-content: space-between; font-size: 16px; padding: 10px 0; border-bottom: 1px solid #111; }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
        .safe { background: #064e3b; color: #22c55e; }
        .danger { background: #450a0a; color: #ef4444; }
        .warning { background: #78350f; color: #fbbf24; }

        #log-container { width: 95%; max-width: 500px; margin-top: 20px; background: #000; border: 1px solid #333; height: 180px; overflow-y: auto; padding: 15px; font-size: 11px; border-radius: 15px; color: #888; box-sizing: border-box; }
        .log-entry { margin-bottom: 8px; border-right: 3px solid var(--gold); padding-right: 10px; }
    </style>
</head>
<body onload="startAnalysis()">

    <div class="sezar-header">
        <h2 style="margin:0; color:var(--gold); letter-spacing: 3px;">「 GHOST HUNTER 」</h2>
        <div style="font-size: 10px; color:#555; margin-top: 5px;">نظام كشف تلاعب البنوك - المطور سيزار</div>
    </div>

    <div class="search-box">
        <input type="text" id="symbol" value="BTCUSDT" onchange="startAnalysis()">
    </div>

    <div class="monitor-panel">
        <div class="card" id="iceberg-card">
            <div class="card-title"><span>ICEBERG DETECTOR</span><span class="status-badge safe" id="ice-status">SCANNING</span></div>
            <div id="ice-data">
                <div class="data-row"><span>تجديد السيولة:</span> <span id="refill-rate" style="color:var(--gold);">0%</span></div>
                <div class="data-row"><span>ضغط الحيتان:</span> <span id="whale-pressure">LOW</span></div>
            </div>
        </div>

        <div class="card" id="spoof-card">
            <div class="card-title"><span>SPOOFING RADAR</span><span class="status-badge safe" id="spoof-status">STABLE</span></div>
            <div id="spoof-data">
                <div class="data-row"><span>جدران مهربة:</span> <span id="fled-walls">0</span></div>
                <div class="data-row"><span>ثبات الجدار:</span> <span id="stability">100%</span></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><span>LIQUIDITY VOIDS</span><span class="status-badge warning">DANGER ZONE</span></div>
            <div class="data-row"><span>فجوة الصعود:</span> <span id="up-gap" style="color:#22c55e;">0.00%</span></div>
            <div class="data-row"><span>فجوة الهبوط:</span> <span id="down-gap" style="color:#ef4444;">0.00%</span></div>
        </div>
    </div>

    <div id="log-container">
        <div class="log-entry" style="color:#555;">> تم تشغيل المحرك.. بانتظار حركة الحيتان..</div>
    </div>

    <script>
        let currentSymbol = '', pInt, alertAudio = new Audio('https://www.soundjay.com/buttons/beep-07a.mp3');
        let lastBids = [], lastAsks = [];

        function startAnalysis() {
            const sym = document.getElementById('symbol').value.toUpperCase();
            if(sym === currentSymbol) return;
            currentSymbol = sym;
            clearInterval(pInt);
            addLog(`بدء مراقبة ${currentSymbol}...`);
            fetchData();
            pInt = setInterval(fetchData, 3000);
        }

        async function fetchData() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentSymbol}&limit=500`);
                const data = await res.json();
                analyze(data.bids, data.asks);
            } catch (e) {}
        }

        function analyze(bids, asks) {
            // 1. كشف الفجوات (Voids)
            let topB = parseFloat(bids[0][0]), topA = parseFloat(asks[0][0]);
            let upG = ((parseFloat(asks[10][0]) - topA) / topA * 100).toFixed(2);
            let downG = ((topB - parseFloat(bids[10][0])) / topB * 100).toFixed(2);
            document.getElementById('up-gap').innerText = upG + "%";
            document.getElementById('down-gap').innerText = downG + "%";

            // 2. تطوير نظام الـ Iceberg الحقيقي
            let iceRate = 0;
            if (lastBids.length > 0) {
                // مراقبة سرعة التغيير عند أول سعر (تجديد حقيقي)
                let bDiff = Math.abs(parseFloat(bids[0][1]) - parseFloat(lastBids[0][1]));
                let aDiff = Math.abs(parseFloat(asks[0][1]) - parseFloat(lastAsks[0][1]));
                iceRate = (Math.min((bDiff + aDiff) * 5, 95)).toFixed(1); // معادلة لحساب شدة التجديد
                
                document.getElementById('refill-rate').innerText = iceRate + "%";
                
                if (iceRate > 10) {
                    triggerAlert('iceberg');
                    document.getElementById('whale-pressure').innerText = bDiff > aDiff ? "🟢 BUYING" : "🔴 SELLING";
                    addLog(`تنبيه: اكتشاف أمر مخفي (Iceberg) يتم تجديده!`);
                } else {
                    resetAlert('iceberg');
                    document.getElementById('whale-pressure').innerText = "LOW";
                }
            }

            // 3. كشف التلاعب (Spoofing)
            let vanished = 0;
            if (lastAsks.length > 0) {
                lastAsks.slice(0, 20).forEach(prev => {
                    if (!asks.some(curr => curr[0] === prev[0]) && parseFloat(prev[1]) > 2) vanished++;
                });
                document.getElementById('fled-walls').innerText = vanished;
                if (vanished > 1) {
                    triggerAlert('spoof');
                    addLog(`تنبيه: سحب ${vanished} جدران وهمية!`);
                } else {
                    resetAlert('spoof');
                }
            }

            lastBids = bids; lastAsks = asks;
        }

        function triggerAlert(type) {
            alertAudio.play();
            const card = document.getElementById(type === 'spoof' ? 'spoof-card' : 'iceberg-card');
            const status = document.getElementById(type === 'spoof' ? 'spoof-status' : 'ice-status');
            card.classList.add('ghost-alert');
            status.innerText = type === 'spoof' ? "SPOOFING DETECTED" : "ICEBERG DETECTED";
            status.className = "status-badge danger";
        }

        function resetAlert(type) {
            const card = document.getElementById(type === 'spoof' ? 'spoof-card' : 'iceberg-card');
            const status = document.getElementById(type === 'spoof' ? 'spoof-status' : 'ice-status');
            card.classList.remove('ghost-alert');
            status.innerText = type === 'spoof' ? "STABLE" : "SCANNING";
            status.className = "status-badge safe";
        }

        function addLog(msg) {
            const log = document.getElementById('log-container');
            const e = document.createElement('div');
            e.className = 'log-entry';
            e.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}`;
            log.prepend(e);
            if (log.children.length > 30) log.removeChild(log.lastChild);
        }
    </script>
</body>
</html>
